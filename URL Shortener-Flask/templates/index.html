<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>URL Shortener</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <h1 class="text-center text-primary mb-4">🔗 URL Shortener</h1>

    <!-- Flash messages -->
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <div class="alert alert-danger text-center">
                {{ messages[0] }}
            </div>
        {% endif %}
    {% endwith %}

    {% if short_url %}
        <div class="card p-4 shadow-sm text-center">
            <h4 class="mb-3">Your Shortened URL</h4>

            <div class="input-group mb-3">
                <input type="text" class="form-control" value="{{ short_url }}" id="shortUrl">
                <button class="btn btn-success" onclick="copyText()">Copy</button>
            </div>

            <a href="/" class="btn btn-secondary">Shorten Another</a>
        </div>
    {% else %}
        <div class="card p-4 shadow-sm">
            <form method="POST">

                <div class="mb-3">
                    <label class="form-label">Enter URL</label>
                    <input type="url" name="url_to_short" class="form-control" placeholder="https://example.com" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Choose Service</label>
                    <select name="service" class="form-select">
                        <option value="TinyURL">TinyURL</option>
                        <option value="Clck.ru">Clck.ru</option>
                        <option value="OSDB">OSDB</option>
                        <option value="Ow.ly">Ow.ly</option>
                    </select>
                </div>

                <button class="btn btn-primary w-100">Shorten URL</button>
            </form>
        </div>
    {% endif %}

</div>

<script>
function copyText() {
    const text = document.getElementById("shortUrl").value;
    navigator.clipboard.writeText(text);
}
</script>

</body>
</html>
